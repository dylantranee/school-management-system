openapi: '3.1.0'
info:
  title: School Management System API
  version: '1.0.0'
  description: API specification for a School Management System with user authentication, academic management, scheduling, fees, and payroll processing.
servers:
  - url: https://api.example.com/api/v1
tags:
  - name: auth
    description: Authentication operations
  - name: users
    description: User account management with roles
  - name: staff
    description: Staff profile management
  - name: students
    description: Student profile management
  - name: subjects
    description: Academic subjects management
  - name: courseSections
    description: Course sections linking subjects, staff, and semesters
  - name: schedules
    description: Scheduling of course sections in rooms and times
  - name: fees
    description: Student fee tracking and payments
  - name: enrollments
    description: Student enrollments in course sections
  - name: salaries
    description: Payroll processing for staff
  - name: rooms
    description: Room management
paths:
  /auth/login:
    post:
      tags:
        - auth
      summary: User login
      description: Authenticate user and return JWT token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Successful login with JWT token
          headers:
            Set-Cookie:
              description: Contains the HttpOnly, Secure JWT cookie.
              schema:
                type: string
          content: {}
        '400':
          description: Bad request (missing or invalid credentials)
        '401':
          description: Unauthorized (invalid username or password)
        '403':
          description: Forbidden (Account is inactive or suspended).
        '429':
          description: Too Many Requests (Account temporarily locked due to excessive failed attempts).
  /auth/logout:
    post:
      tags:
        - auth
      summary: User logout
      description: Invalidate user session or token.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Successful logout
          headers:
            Set-Cookie:
              description: Clears the JWT cookie by setting Max-Age=0.
              schema:
                type: string
        '401':
          description: Unauthorized (invalid or missing token)
  /users:
    get:
      tags:
