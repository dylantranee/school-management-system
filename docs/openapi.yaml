  /rooms:
    get:
      tags:
        - rooms
      summary: Get all rooms
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Room'
        '401':
          description: Unauthorized
    post:
      tags:
        - rooms
      summary: Create a new room
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreate'
      responses:
        '201':
          description: Room created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /rooms/{roomId}:
    get:
      tags:
        - rooms
      summary: Get room by ID
      security:
        - cookieAuth: []
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Room details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Room not found
    put:
      tags:
        - rooms
      summary: Update room by ID
      security:
        - cookieAuth: []
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomUpdate'
      responses:
        '200':
          description: Room updated successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Room not found
    delete:
      tags:
        - rooms
      summary: Delete room by ID
      security:
        - cookieAuth: []
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Room deleted successfully
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Room not found
